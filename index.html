    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #1E5C52; --p-deep: #14342E; --p2: #2C786C; --p-soft: #EAF2EF; --p-light: #EAF2EF;
            --accent: #C9A227; --bg: #FBFBF8; --white: #FFFFFF; --txt: #1A2926; --muted: #8A9794;
            --line: #EEF1F0; --border: #EEF1F0; --skeleton: #ECEFEE;
            --radius-sm: 12px; --radius-md: 18px;
            --shadow-sm: 0 3px 16px rgba(30,92,82,.05);
            --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        body { font-family: var(--font); background: var(--bg); color: var(--txt); padding-bottom: calc(92px + env(safe-area-inset-bottom, 0px)); -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
        button, input, select { font-family: inherit; -webkit-tap-highlight-color: transparent; }

        /* ── HEADER (editorial: claro, tipografía protagonista) ── */
        .header { background: var(--bg); padding: 20px 20px 6px; position: -webkit-sticky; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .logo { font-size: 25px; font-weight: 800; color: var(--p-deep); letter-spacing: -1.2px; }
        .logo span { color: var(--accent); }
        .logo-dot { display: none; }
        .location-pill { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700; color: var(--p); }
        .location-pill svg { width: 15px; height: 15px; flex-shrink: 0; }
        .location-pill select { background: transparent; color: var(--p); border: none; outline: none; font-size: 13px; font-weight: 700; font-family: inherit; -webkit-appearance: none; appearance: none; cursor: pointer; max-width: 150px; }
        .location-pill select option { color: var(--txt); }

        .search-wrap { background: var(--white); border: 1.5px solid var(--line); border-radius: 16px; display: flex; align-items: center; padding: 13px 16px; margin-bottom: 16px; box-shadow: 0 2px 10px rgba(30,92,82,.04); transition: border-color .2s; }
        .search-wrap:focus-within { border-color: #CFE0DB; }
        .search-icon { color: var(--muted); margin-right: 10px; flex-shrink: 0; display: flex; }
        .search-icon svg { width: 18px; height: 18px; }
        .search-input { flex: 1; border: none; outline: none; font-size: 16px; font-family: inherit; color: var(--txt); background: transparent; min-width: 0; }
        .search-input::placeholder { color: #AEB8B5; }
        .clear-btn { background: var(--skeleton); border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 11px; color: var(--muted); display: none; align-items: center; justify-content: center; flex-shrink: 0; }
        .clear-btn.visible { display: flex; }

        /* ── SEGMENTADOR (pestañas limpias) ── */
        .segment { display: flex; gap: 22px; padding: 0 2px; border-bottom: 1.5px solid var(--line); }
        .seg-btn { padding: 6px 0 12px; border: none; background: transparent; color: var(--muted); font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; position: relative; transition: color .2s; }
        .seg-btn.active { color: var(--p-deep); }
        .seg-btn.active::after { content: ''; position: absolute; left: 0; right: 0; bottom: -1.5px; height: 2.5px; background: var(--p); border-radius: 2px; }

        /* ── CHIPS ── */
        .chips-row { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 16px 18px 4px; gap: 8px; scrollbar-width: none; }
        .chips-row::-webkit-scrollbar { display: none; }
        .chip { background: var(--white); padding: 8px 15px; border-radius: 20px; font-size: 12.5px; font-weight: 600; white-space: nowrap; color: var(--muted); border: 1.5px solid var(--line); cursor: pointer; transition: background .18s, color .18s, border-color .18s; -webkit-user-select: none; user-select: none; }
        .chip.active { background: var(--p); color: var(--white); border-color: var(--p); }

        /* ── ORDEN ── */
        .sort-row { display: flex; padding: 12px 18px 2px; gap: 8px; }
        .sort-btn { background: transparent; border: 1.5px solid var(--line); padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit; transition: background .18s, color .18s, border-color .18s; }
        .sort-btn.active { background: var(--p-soft); color: var(--p); border-color: transparent; }

        /* ── SECCIONES ── */
        .section-wrap { display: none; } .section-wrap.active { display: block; animation: slideUp .28s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .list { padding: 14px 18px 4px; display: flex; flex-direction: column; gap: 12px; }
        .sec-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; padding: 16px 18px 0; }

        /* ── TARJETA (editorial con alma) ── */
        .card { background: var(--white); border-radius: var(--radius-md); padding: 18px; border: 1px solid #F2F4F3; box-shadow: var(--shadow-sm); display: flex; gap: 15px; align-items: center; transition: transform .15s; }
        .card:active { transform: scale(.992); }
        .ic-oficio { width: 40px; height: 40px; flex-shrink: 0; }
        .ic-oficio.on { color: var(--p); }
        .ic-oficio.off { color: #C2CCC9; }
        .card-info { flex: 1; min-width: 0; }
        .card-name { font-size: 16.5px; font-weight: 700; color: var(--txt); letter-spacing: -.3px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-type { font-size: 12.5px; color: var(--muted); font-weight: 500; }
        .conf-row { display: flex; flex-wrap: wrap; align-items: center; gap: 4px 10px; margin-top: 8px; }
        .tag-verif { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--p); font-weight: 700; }
        .tag-verif svg { width: 14px; height: 14px; }
        .conf { font-size: 11.5px; color: var(--muted); font-weight: 600; }
        .conf.nuevo { color: #B6C0BD; }
        /* compat: clases viejas por si quedan referencias */
        .card-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--p); font-weight: 700; }
        .badge-good { color: var(--p); }
        .card-meta-conf { font-size: 11.5px; color: var(--muted); font-weight: 600; margin-top: 6px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .avatar-ini, .avatar.rank-bronze { background: var(--p-soft); color: var(--p); font-size: 22px; font-weight: 800; }

        /* ── ACCIONES DE TARJETA ── */
        .card-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .btn-wa { width: 42px; height: 42px; border-radius: 50%; background: var(--p-deep); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .14s; padding: 0; }
        .btn-wa:active { transform: scale(.9); }
        .btn-wa svg { width: 20px; height: 20px; color: #fff; }
        .btn-fav { width: 42px; height: 42px; border-radius: 50%; background: var(--white); border: 1.5px solid var(--line); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform .14s, border-color .15s; flex-shrink: 0; color: #CBD4D1; padding: 0; }
        .btn-fav svg { width: 20px; height: 20px; }
        .btn-fav.active { color: #E2615A; border-color: #F3D2CF; background: #FCEFEE; }
        .btn-fav.active svg { fill: #E2615A; }
        .btn-fav:active { transform: scale(.9); }
        .btn-row { display: flex; gap: 8px; margin-top: 4px; }

        /* ── SKELETON / VACÍO ── */
        .skeleton-card { background: var(--white); border-radius: var(--radius-md); padding: 18px; border: 1px solid #F2F4F3; }
        .sk { background: var(--skeleton); border-radius: 6px; animation: pulse 1.4s ease-in-out infinite; }
        .sk-avatar { width: 40px; height: 40px; border-radius: 12px; } .sk-line { height: 12px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .45; } }
        .empty-state { text-align: center; padding: 54px 24px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .empty-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--p-soft); display: flex; align-items: center; justify-content: center; color: var(--p); font-size: 26px; }
        .empty-icon svg { width: 28px; height: 28px; }
        .empty-title { font-size: 16px; font-weight: 700; color: var(--txt); }
        .empty-sub { font-size: 13px; color: var(--muted); line-height: 1.5; max-width: 280px; }

        /* ── PERFIL / FORMULARIO ── */
        .profile-wrap { padding: 22px 18px; }
        .profile-wrap h2 { font-size: 24px; font-weight: 800; color: var(--p-deep); letter-spacing: -.6px; margin-bottom: 18px; }
        .btn-google { width: 100%; padding: 14px; background: var(--white); color: var(--txt); border: 1.5px solid var(--line); border-radius: var(--radius-sm); font-weight: 700; font-size: 15px; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background .15s; }
        .btn-google:active { background: #f5f6f5; }
        .auth-sep { text-align: center; color: var(--muted); font-size: 12px; margin: 16px 0; }
        .form-seg { display: flex; background: var(--p-soft); border-radius: var(--radius-sm); padding: 4px; gap: 4px; margin-bottom: 18px; }
        .fseg-btn { flex: 1; padding: 10px; border: none; border-radius: 9px; background: transparent; color: var(--muted); font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .2s, color .2s; }
        .fseg-btn.active { background: var(--white); color: var(--p); box-shadow: var(--shadow-sm); }
        .form-card { background: var(--white); border-radius: var(--radius-md); padding: 20px; border: 1px solid #F2F4F3; box-shadow: var(--shadow-sm); }
        .form-card h3 { font-size: 17px; font-weight: 800; margin-bottom: 4px; color: var(--p-deep); }
        .form-card p { font-size: 13px; color: var(--muted); }
        .form-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; display: block; margin-top: 16px; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 13px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--line); outline: none; font-size: 16px; font-family: inherit; background: var(--bg); color: var(--txt); transition: border-color .18s, background .18s; -webkit-appearance: none; appearance: none; }
        .form-input:focus { border-color: var(--p); background: var(--white); }
        .form-btn { width: 100%; padding: 15px; background: var(--p); color: var(--white); border: none; border-radius: var(--radius-sm); font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 20px; font-family: inherit; transition: opacity .18s, transform .14s; }
        .form-btn:active { opacity: .9; transform: scale(.99); } .form-btn:disabled { opacity: .55; }
        .cat-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .cat-chip { display: inline-flex; align-items: center; gap: 6px; padding: 9px 13px; border-radius: 20px; border: 1.5px solid var(--line); background: var(--bg); font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; -webkit-user-select: none; user-select: none; transition: background .15s, color .15s, border-color .15s; }
        .cat-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
        .cat-chip.on { background: var(--p); color: var(--white); border-color: var(--p); }

        /* ── HISTORIAL ── */
        .hist-card { background: var(--white); border-radius: var(--radius-md); padding: 18px; margin-bottom: 12px; border: 1px solid #F2F4F3; box-shadow: var(--shadow-sm); }
        .hist-title { font-size: 16px; font-weight: 700; color: var(--txt); margin-bottom: 4px; }
        .hist-meta { font-size: 13px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
        .rec-row { display: flex; gap: 8px; margin-top: 6px; }
        .rec-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--line); background: var(--bg); font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .15s, border-color .15s, transform .12s; color: var(--txt); display: inline-flex; align-items: center; justify-content: center; gap: 7px; }
        .rec-btn svg { width: 17px; height: 17px; flex-shrink: 0; }
        .rec-btn:active { transform: scale(.98); }
        .rec-btn.si { color: var(--p); }
        .rec-btn.si:active { background: var(--p-soft); border-color: var(--p); }
        .rec-btn.no { flex: 0 0 92px; color: #B45309; }
        .rec-btn.no:active { background: #FEF3E2; }
        .rec-done { display: inline-flex; align-items: center; gap: 7px; color: var(--p); font-weight: 700; font-size: 14px; }
        .rec-done svg { width: 17px; height: 17px; flex-shrink: 0; }

        /* ── NAV INFERIOR ── */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(251,251,248,.92); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); border-top: 1px solid var(--line); display: flex; justify-content: space-around; padding: 10px 0 calc(18px + env(safe-area-inset-bottom, 0px)); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; color: #AAB4B1; cursor: pointer; transition: color .18s; padding: 2px 16px; }
        .nav-item.active { color: var(--p); }
        .nav-ic { width: 22px; height: 22px; display: block; }

        /* ── TOAST ── */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--p-deep); color: var(--white); padding: 12px 22px; border-radius: 22px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity .3s ease, transform .3s ease; pointer-events: none; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,.18); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.ok { background: var(--p); } .toast.err { background: #C0492F; }

        .card-enter { animation: cardIn .3s ease both; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }
    </style>
</head>
<body>

<header class="header">
    <div class="header-top">
        <div class="logo">tu<span>repo</span></div>
        <div class="location-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg><select id="sel-estado" aria-label="Estado"></select></div>
    </div>
    <div class="search-wrap">
        <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg></span>
        <input type="search" class="search-input" id="search-input" placeholder="Buscar servicios…" autocomplete="off" enterkeyhint="search" aria-label="Buscar">
        <button class="clear-btn" id="clear-btn" aria-label="Limpiar">✕</button>
    </div>
    <div class="segment" id="segmentador">
        <button class="seg-btn active" onclick="switchTab('servicios', this)">Servicios</button>
        <button class="seg-btn" onclick="switchTab('restaurantes', this)">Restaurantes</button>
    </div>
</header>

<div id="servicios-section" class="section-wrap active">
    <div class="chips-row" id="chips-servicios"></div>
    <div class="sort-row">
        <button class="sort-btn active" onclick="setOrden('mejor', this)">Más confiables</button>
        <button class="sort-btn" onclick="setOrden('recientes', this)">Más recientes</button>
    </div>
    <p class="sec-title" id="count-servicios"></p>
    <div class="list" id="lista-servicios"></div>
</div>

<div id="restaurantes-section" class="section-wrap">
    <div class="chips-row" id="chips-restaurantes"></div>
    <div class="sort-row">
        <button class="sort-btn active" onclick="setOrden('mejor', this)">Más confiables</button>
        <button class="sort-btn" onclick="setOrden('recientes', this)">Más recientes</button>
    </div>
    <p class="sec-title" id="count-restaurantes"></p>
    <div class="list" id="lista-restaurantes"></div>
</div>

<div id="favoritos-section" class="section-wrap">
    <div class="profile-wrap">
        <h2>Mis Favoritos</h2>
        <div id="lista-favoritos"></div>
    </div>
</div>

<div id="historial-section" class="section-wrap">
    <div class="profile-wrap">
        <h2>Mis contactos</h2>
        <div id="lista-historial"></div>
    </div>
</div>

<div id="perfil-section" class="section-wrap">
    <div class="profile-wrap">
        <h2>Mi Cuenta</h2>
        <div id="pant-no-sesion">
            <button class="btn-google" onclick="entrarGoogle()">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 5.1 29.5 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 5.1 29.5 3 24 3 16 3 9.1 7.6 6.3 14.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 9.9-2 13.5-5.2l-6.2-5.3C29.2 36 26.7 37 24 37c-5.3 0-9.7-2.6-11.3-7l-6.5 5C9.1 42.3 16 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.1 5.5l6.2 5.3C39.8 36.6 45 31 45 24c0-1.2-.1-2.3-.4-3.5z"/></svg>
                Continuar con Google
            </button>
            <div class="auth-sep">o con tu correo</div>
            <div class="form-seg">
                <button class="fseg-btn active" onclick="authTab('entrar', this)">Iniciar sesión</button>
                <button class="fseg-btn" onclick="authTab('crear', this)">Crear cuenta</button>
            </div>
            <div class="form-card">
                <label class="form-label">Correo</label>
                <input type="email" inputmode="email" class="form-input" id="au-email" placeholder="tucorreo@gmail.com" autocomplete="email">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-input" id="au-pass" placeholder="••••••••" autocomplete="current-password">
                <button class="form-btn" id="au-btn" onclick="authSubmit()">Iniciar sesión</button>
            </div>
        </div>
        <div id="pant-sesion" style="display:none">
            <div class="form-card" style="display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center;">
                <div class="avatar rank-bronze" id="ses-inicial" style="width:70px; height:70px; font-size:28px; font-weight:800;">👤</div>
                <h3>Sesión iniciada</h3>
                <p>Conectado como:<br><strong id="ses-email" style="color:var(--p); font-size:15px;"></strong></p>
                <button class="form-btn" onclick="mostrarFormProveedor()" style="margin-top:6px;">➕ Publicar mi negocio</button>
                <button class="form-btn" onclick="cerrarSesion()" style="background:#E74C3C; box-shadow:none; margin-top:2px;">Cerrar sesión</button>
            </div>

            <div class="form-card" id="form-proveedor" style="display:none; margin-top:14px;">
                <h3>Publicar mi negocio</h3>
                <p>Aparecerás en el directorio de tu estado.</p>
                <label class="form-label">¿Qué ofreces?</label>
                <select class="form-input" id="pv-tipo" onchange="pintarCatsProveedor()">
                    <option value="servicio">Un servicio</option>
                    <option value="restaurante">Restaurante / comida</option>
                </select>
                <label class="form-label">Nombre o razón social</label>
                <input type="text" class="form-input" id="pv-nombre" placeholder="Ej: Refrigeración Pérez">
                <label class="form-label">Teléfono (WhatsApp)</label>
                <input type="tel" inputmode="tel" class="form-input" id="pv-tel" placeholder="Ej: 04141234567">
                <label class="form-label">Estado</label>
                <select class="form-input" id="pv-estado"></select>
                <label class="form-label">Categorías (elige hasta 3)</label>
                <div class="cat-grid" id="pv-cats"></div>
                <label class="form-label">Especialidad (opcional)</label>
                <input type="text" class="form-input" id="pv-esp" placeholder="Ej: Aires, neveras, lavadoras">

    try {

            const { error } = await sb.from('favoritos').delete()
                .eq('cuenta_id', session.user.id).eq('proveedor_id', provId);
            if (error) throw error;
            favsSet.delete(provId);

function renderCard(p, delay = 0) {
    const verif = p.verificado;
    const tipoTxt = [p.categorias.join(' · '), p.especialidad].filter(Boolean).join(' · ');

    // Línea de confianza: Verificado (principal) + recomendaciones / nuevo / solicitado
    const sig = [];
    if (verif) sig.push(`<span class="tag-verif">${SVG_CHECK} Verificado</span>`);
    if ((p.opiniones || 0) > 0) {
        const r = p.recomendaciones || 0;
        sig.push(`<span class="conf">${r} recomienda${r === 1 ? '' : 'n'}</span>`);
    } else if (!verif) {
        sig.push('<span class="conf nuevo">Nuevo</span>');
    }
    if ((p.contactos || 0) >= UMBRAL_SOLICITADO) sig.push('<span class="conf">Muy solicitado</span>');

    const fav = favsSet.has(p.id);
    return `
    <div class="card card-enter" style="animation-delay:${delay}ms">
        <div class="ic-oficio ${verif ? 'on' : 'off'}">${svgOficio(p)}</div>
        <div class="card-info">
            <div class="card-name">${esc(p.nombre)}</div>
            <div class="card-type">${esc(tipoTxt)}</div>
            <div class="conf-row">${sig.join('')}</div>

        <div class="card-actions">
            <button class="btn-fav ${fav ? 'active' : ''}" aria-label="Favorito" onclick="toggleFav('${p.id}', this)">${SVG_HEART}</button>
            <button class="btn-wa" aria-label="WhatsApp" onclick="contactar('${p.id}', '${p.telefono}')">${SVG_WA}</button>
        </div>
    </div>`;
}

async function cargarProveedores(estadoId) {
    skeletons('lista-servicios'); skeletons('lista-restaurantes', 2);
    const { data, error } = await sb
        .from('proveedores')
        .select('id, nombre, telefono, tipo, especialidad, verificado, recomendaciones, opiniones, contactos, creado_en, proveedor_categorias(categorias(nombre))')
        .eq('estado_id', estadoId);
    if (error) {
        document.getElementById('lista-servicios').innerHTML = vacio(VAC.alert, 'Error', 'No se pudo cargar. Revisa tu conexión.');
        document.getElementById('lista-restaurantes').innerHTML = '';
        return;
    }
    // Aplanamos las categorías de cada proveedor a un array de nombres.
    proveedores = (data || []).map(p => ({
        ...p,
        categorias: (p.proveedor_categorias || []).map(pc => pc.categorias ? pc.categorias.nombre : '').filter(Boolean)
    }));
    render('servicios'); render('restaurantes');
}

// ── Render con filtros ──
function render(tab) {
    const q = quitarTildes(query.trim().toLowerCase());
    const cat = filtroCat[tab];
    const tipo = tab === 'servicios' ? 'servicio' : 'restaurante';

    let lista = proveedores.filter(p => p.tipo === tipo);
    if (cat !== 'Todos') lista = lista.filter(p => p.categorias.includes(cat));
    if (q) {
        lista = lista.filter(p => {
            const txt = quitarTildes((p.nombre + ' ' + p.categorias.join(' ') + ' ' + (p.especialidad || '')).toLowerCase());
            return txt.includes(q);
        });
    }
    lista.sort((a, b) => {
        if (orden === 'recientes') return new Date(b.creado_en) - new Date(a.creado_en);
        // "más confiables": verificados primero, luego más recomendados, luego más solicitados
        const va = a.verificado ? 1 : 0, vb = b.verificado ? 1 : 0;
        if (vb !== va) return vb - va;
        if ((b.recomendaciones || 0) !== (a.recomendaciones || 0)) return (b.recomendaciones || 0) - (a.recomendaciones || 0);
        return (b.contactos || 0) - (a.contactos || 0);
    });

    const cont = document.getElementById('lista-' + tab);
    const counter = document.getElementById('count-' + tab);
    if (lista.length === 0) {
        cont.innerHTML = vacio(VAC.search, 'Sin resultados', 'Aún no hay nada en esta categoría o estado.');
        counter.textContent = '';
    } else {
        cont.innerHTML = lista.map((p, i) => renderCard(p, Math.min(i, 10) * 35)).join('');
        counter.textContent = `${lista.length} resultado${lista.length !== 1 ? 's' : ''}`;
    }
}

function switchTab(tab, el) {

    document.getElementById('restaurantes-section').classList.toggle('active', tab === 'restaurantes');
    document.getElementById('search-input').placeholder = tab === 'restaurantes' ? 'Buscar restaurantes…' : 'Buscar servicios…';
}
function filtrar(tab, cat, el) {
    filtroCat[tab] = cat;
    el.closest('.chips-row').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    render(tab);
}
function setOrden(o, el) {
    orden = o;
    el.closest('.sort-row').querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render(tabActivo);
}

const sInput = document.getElementById('search-input'), cBtn = document.getElementById('clear-btn');
let tmr;
sInput.addEventListener('input', e => {
    query = e.target.value;
    cBtn.classList.toggle('visible', query.length > 0);
    clearTimeout(tmr); tmr = setTimeout(() => render(tabActivo), 220);
});
cBtn.addEventListener('click', () => { sInput.value = ''; query = ''; cBtn.classList.remove('visible'); render(tabActivo); sInput.focus(); });

// ── Navegación entre secciones ──
function navegar(dest, el) {
    document.querySelectorAll('.bottom-nav .nav-item').forEach(i => i.classList.remove('active'));
    if (el) el.classList.add('active');
    const hdr = document.querySelector('.header');
    ['servicios-section', 'restaurantes-section', 'perfil-section', 'favoritos-section', 'historial-section'].forEach(id => document.getElementById(id).classList.remove('active'));
    if (dest === 'inicio') {
        hdr.style.display = '';
        document.getElementById(tabActivo + '-section').classList.add('active');
    } else if (dest === 'perfil') {
        hdr.style.display = 'none';
        document.getElementById('perfil-section').classList.add('active');
        window.scrollTo(0, 0);
    } else if (dest === 'favoritos') {
        hdr.style.display = 'none';
        document.getElementById('favoritos-section').classList.add('active');
        window.scrollTo(0, 0);
        renderFavoritos();
    } else if (dest === 'historial') {
        hdr.style.display = 'none';
        document.getElementById('historial-section').classList.add('active');
        window.scrollTo(0, 0);
        renderHistorial();
    }
}

// ── Autenticación (login) ──
let authMode = 'entrar';
function authTab(modo, el) {
    authMode = modo;
    el.closest('.form-seg').querySelectorAll('.fseg-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('au-btn').textContent = modo === 'entrar' ? 'Iniciar sesión' : 'Crear cuenta';
}
function traducirError(msg) {
    msg = String(msg || '').toLowerCase();
    if (msg.includes('invalid login')) return 'Correo o contraseña incorrectos';
    if (msg.includes('already registered') || msg.includes('already been')) return 'Ese correo ya está registrado';
    if (msg.includes('password')) return 'La contraseña debe tener al menos 6 caracteres';
    if (msg.includes('email')) return 'Revisa el correo ingresado';
    return 'No se pudo completar. Intenta de nuevo.';
}
async function authSubmit() {
    const email = document.getElementById('au-email').value.trim();
    const pass = document.getElementById('au-pass').value;
    if (!email || !pass) return toast('Llena correo y contraseña', 'err');
    const btn = document.getElementById('au-btn');
    btn.disabled = true; btn.textContent = 'Un momento…';
    try {
        if (authMode === 'crear') {
            const { error } = await sb.auth.signUp({ email, password: pass });
            if (error) throw error;
            toast('¡Cuenta creada! Revisa tu correo para confirmar.', 'ok');
        } else {
            const { error } = await sb.auth.signInWithPassword({ email, password: pass });
            if (error) throw error;
            toast('¡Sesión iniciada!', 'ok');
        }
    } catch (e) {
        toast(traducirError(e.message), 'err');
    } finally {
        btn.disabled = false;
        btn.textContent = authMode === 'entrar' ? 'Iniciar sesión' : 'Crear cuenta';
    }
}
async function entrarGoogle() {
    const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin }
    });
    if (error) toast('No se pudo abrir Google. Intenta de nuevo.', 'err');
}
async function cerrarSesion() {
    await sb.auth.signOut();
    toast('Sesión cerrada', 'ok');
}
function actualizarSesion(session) {
    const u = session && session.user;
    document.getElementById('pant-no-sesion').style.display = u ? 'none' : 'block';
    document.getElementById('pant-sesion').style.display = u ? 'block' : 'none';
    if (u) {
        document.getElementById('ses-email').textContent = u.email || 'usuario';
        const ini = (u.email || '?').charAt(0).toUpperCase();
        document.getElementById('ses-inicial').textContent = ini;
    }
    sincronizarFavoritos(session);
}
async function sincronizarFavoritos(session) {
    favsSet = new Set();
    if (session && session.user) {
        const { data } = await sb.from('favoritos').select('proveedor_id');
        if (data) data.forEach(f => favsSet.add(f.proveedor_id));
    }
    if (proveedores.length) { render('servicios'); render('restaurantes'); }
}
sb.auth.onAuthStateChange((_evento, session) => actualizarSesion(session));
sb.auth.getSession().then(({ data }) => actualizarSesion(data.session));

// ── Publicar negocio (registrar proveedor) ──
function mostrarFormProveedor() {
    const f = document.getElementById('form-proveedor');
    const visible = f.style.display !== 'none';
    f.style.display = visible ? 'none' : 'block';
    if (!visible) {
        const selE = document.getElementById('pv-estado');
        selE.innerHTML = estadosCache.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
        selE.value = document.getElementById('sel-estado').value;
        pintarCatsProveedor();
        f.scrollIntoView({ behavior: 'smooth' });
    }
}
function pintarCatsProveedor() {
    const tipo = document.getElementById('pv-tipo').value;
    const cats = categoriasCache.filter(c => c.ambito === tipo);
    document.getElementById('pv-cats').innerHTML = cats.map(c =>
        `<label class="cat-chip"><input type="checkbox" class="pv-cat" value="${c.id}" onchange="togglePvCat(this)">${c.nombre}</label>`
    ).join('');
}
function togglePvCat(cb) {
    const n = document.querySelectorAll('.pv-cat:checked').length;
    if (cb.checked && n > 3) { cb.checked = false; toast('Máximo 3 categorías', 'err'); return; }
    cb.closest('.cat-chip').classList.toggle('on', cb.checked);
}
async function registrarProveedor() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return toast('Inicia sesión primero', 'err');

    const nombre = document.getElementById('pv-nombre').value.trim();
    const tel = document.getElementById('pv-tel').value.trim();
    const tipo = document.getElementById('pv-tipo').value;
    const estadoId = parseInt(document.getElementById('pv-estado').value);
    const esp = document.getElementById('pv-esp').value.trim();
    const cats = Array.from(document.querySelectorAll('.pv-cat:checked')).map(c => parseInt(c.value));

    if (nombre.length < 3) return toast('Escribe un nombre válido', 'err');
    const dig = tel.replace(/[^\d]/g, '');
    if (dig.length < 10 || dig.length > 13) return toast('Revisa el teléfono', 'err');
    if (cats.length === 0) return toast('Elige al menos una categoría', 'err');

    const btn = document.getElementById('pv-btn');
    btn.disabled = true; btn.textContent = 'Publicando…';
    try {
        const { data: prov, error } = await sb.from('proveedores').insert({
            cuenta_id: session.user.id, estado_id: estadoId, nombre, telefono: tel, tipo, especialidad: esp || null
        }).select('id').single();
        if (error) throw error;

        const filas = cats.map(cid => ({ proveedor_id: prov.id, categoria_id: cid }));
        const { error: e2 } = await sb.from('proveedor_categorias').insert(filas);
        if (e2) throw e2;

        toast('¡Negocio publicado!', 'ok');
        document.getElementById('pv-nombre').value = '';
        document.getElementById('pv-tel').value = '';
        document.getElementById('pv-esp').value = '';
        document.getElementById('form-proveedor').style.display = 'none';
        document.getElementById('sel-estado').value = estadoId;
        cargarProveedores(estadoId);
        navegar('inicio', document.querySelector('.bottom-nav .nav-item'));
    } catch (e) {
        toast('No se pudo publicar. ' + (e.message || ''), 'err');
    } finally {
        btn.disabled = false; btn.textContent = 'Publicar';
    }
}

// ── Arranque ──
cargarCategorias();
cargarEstados();
