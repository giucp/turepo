name: Moderar fotos (Gemini)

# FASE 1 (simulacro): solo se dispara a mano para revisar veredictos sin tocar nada.
# FASE 2 (en vivo): descomentar el schedule y poner DRY_RUN en 'false' (o conectar cron-job.org).
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simulacro (true = solo registra, no aprueba/rechaza)"
        type: boolean
        default: true
  # schedule:
  #   - cron: "*/5 * * * *"     # cada 5 min (respaldo; el disparo real será cron-job.org)

jobs:
  moderar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Moderar fotos pendientes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Vacío en runs automáticos => el script usa simulacro por defecto (seguro).
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python scripts/moderar_fotos.py
