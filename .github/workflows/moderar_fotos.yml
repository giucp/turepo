name: Moderar fotos (Groq)

# FASE 1 (simulacro): solo se dispara a mano para revisar veredictos sin tocar nada.
# FASE 2 (en vivo): descomentar el schedule y poner DRY_RUN en 'false' (o conectar cron-job.org).
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simulacro (marca esta casilla = solo registra, no aprueba/rechaza)"
        type: boolean
        default: false
  schedule:
    - cron: "*/5 * * * *"     # cada 5 min (respaldo; el disparo real es cron-job.org)

jobs:
  moderar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Moderar fotos pendientes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Runs automáticos (cron-job.org/schedule) => EN VIVO. Manual con dry_run=true => simulacro.
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/moderar_fotos.py
